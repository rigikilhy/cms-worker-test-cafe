name: Deploy Cloudflare Pages
run-name: CMS deploy ${{ inputs.deployId }} for ${{ inputs.clientId }}

on:
  workflow_dispatch:
    inputs:
      clientId:
        description: Client id from the shared CMS deploy Worker
        required: true
        type: string
      deployId:
        description: Unique deploy id generated by the shared CMS deploy Worker
        required: true
        type: string
      pagesProjectName:
        description: Test project name passed through by the shared Worker
        required: true
        type: string

concurrency:
  group: cloudflare-pages-${{ inputs.clientId }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm exec wrangler pages deploy out --project-name "$CLOUDFLARE_PAGES_PROJECT" --branch "$GITHUB_BRANCH"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_PAGES_PROJECT: ${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
          GITHUB_BRANCH: ${{ github.ref_name }}
