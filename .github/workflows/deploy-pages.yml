name: Deploy GitHub Pages
run-name: CMS deploy ${{ inputs.deployId }} for ${{ inputs.clientId }}

on:
  workflow_dispatch:
    inputs:
      clientId:
        description: Client id from the shared CMS deploy Worker
        required: true
        type: string
      deployId:
        description: Unique deploy id generated by the shared CMS deploy Worker
        required: true
        type: string
      pagesProjectName:
        description: Test project name passed through by the shared Worker
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-${{ inputs.clientId }}
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/build.mjs
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out
      - id: deployment
        uses: actions/deploy-pages@v4
